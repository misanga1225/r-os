name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, llvm-tools, rust-src
          targets: x86_64-unknown-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build
        env:
          CARGO_PROFILE_DEV_PANIC: abort
        run: cargo build --workspace -Z build-std=core,compiler_builtins -Z build-std-features=panic_immediate_abort

      - name: Test
        run: cargo test --workspace --exclude kernel
